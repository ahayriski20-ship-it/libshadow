name: Build libshadow.so

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup NDK r25c
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip
        echo "NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

    - name: Build
      run: |
        $NDK_HOME/ndk-build NDK_PROJECT_PATH=. \
          APP_BUILD_SCRIPT=jni/Android.mk \
          NDK_APPLICATION_MK=jni/Application.mk \
          -j4

    - name: Rename output
      run: |
        mkdir -p release
        cp libs/armeabi-v7a/libshadow.so release/libshadow.so

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libshadow-armeabi
        path: release/libshadow.so
        retention-days: 30

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ github.run_number }}
        name: "libshadow build #${{ github.run_number }}"
        files: release/libshadow.so
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
